<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkmate ✓</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0F0F1A; color: #fff; height: 100vh; overflow: hidden; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes checkBounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .app { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 280px; min-width: 280px; background: linear-gradient(180deg, #161628 0%, #0F0F1A 100%);
    border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column;
    transition: all 0.3s ease; overflow: hidden;
  }
  .sidebar.closed { width: 0; min-width: 0; border-right: none; }
  .sidebar-header { padding: 28px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .logo {
    font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, #FF6B6B, #A78BFA, #4ECDC4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 200% 200%; animation: gradientShift 4s ease infinite;
  }
  .logo-sub { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .sidebar-lists { flex: 1; overflow-y: auto; padding: 12px; }
  .sidebar-bottom { padding: 12px 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); }

  .sidebar-item {
    padding: 12px 14px; margin-bottom: 6px; border-radius: 14px; display: flex;
    align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s;
    border: 1.5px solid transparent;
  }
  .sidebar-item:hover { transform: translateX(4px); }
  .sidebar-item.active { transform: translateX(6px) scale(1.02); }
  .sidebar-item .emoji { font-size: 22px; flex-shrink: 0; }
  .sidebar-item .info { flex: 1; min-width: 0; }
  .sidebar-item .name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-item .progress-track { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; margin-top: 4px; }
  .sidebar-item .progress-bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .sidebar-item .pct { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 700; }
  .sidebar-item .del-btn { opacity: 0; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 16px; padding: 4px; transition: opacity 0.2s; }
  .sidebar-item:hover .del-btn { opacity: 1; }

  .input-field {
    border: none; outline: none; background: rgba(255,255,255,0.08); color: #fff;
    border-radius: 12px; padding: 10px 14px; font-family: 'Nunito', sans-serif;
    font-size: 14px; width: 100%; transition: all 0.2s;
  }
  .input-field:focus { background: rgba(255,255,255,0.14); box-shadow: 0 0 0 2px rgba(255,255,255,0.15); }
  .input-field::placeholder { color: rgba(255,255,255,0.35); }

  .btn-primary {
    border: none; border-radius: 12px; padding: 10px 20px; font-family: 'Fredoka', sans-serif;
    font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; color: #0F0F1A;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .btn-ghost {
    border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 10px 20px;
    font-family: 'Nunito', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s;
    background: transparent; color: rgba(255,255,255,0.5);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.04); }

  .emoji-picker { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; max-height: 110px; overflow-y: auto; }
  .emoji-btn { font-size: 18px; padding: 2px; border-radius: 6px; cursor: pointer; transition: transform 0.15s; background: transparent; border: none; }
  .emoji-btn:hover { transform: scale(1.3); }
  .emoji-btn.selected { transform: scale(1.25); background: rgba(255,255,255,0.12); }

  .main { flex: 1; overflow-y: auto; position: relative; }
  .main-inner { max-width: 760px; margin: 0 auto; padding: 32px 24px 100px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; padding: 40px; text-align: center;
  }
  .empty-state .big-emoji { font-size: 72px; animation: wiggle 2s ease-in-out infinite; }
  .empty-state h2 { font-family: 'Fredoka', sans-serif; font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.7); }
  .empty-state p { color: rgba(255,255,255,0.35); max-width: 320px; line-height: 1.6; }

  .list-header { margin-bottom: 32px; }
  .list-title-row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .list-title-row .emoji { font-size: 40px; }
  .list-title-row h2 { font-family: 'Fredoka', sans-serif; font-size: 32px; font-weight: 700; cursor: pointer; }
  .header-progress { display: flex; align-items: center; gap: 12px; }
  .header-progress .track { flex: 1; max-width: 300px; height: 8px; background: rgba(255,255,255,0.06); border-radius: 99px; }
  .header-progress .bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .header-progress .pct { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 16px; }

  .cat-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px; padding: 20px 22px; margin-bottom: 16px; animation: slideUp 0.35s ease-out both;
  }
  .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cat-header .left { display: flex; align-items: center; gap: 10px; }
  .cat-header .dot { width: 10px; height: 10px; border-radius: 50%; }
  .cat-header h3 { font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 600; cursor: pointer; }
  .cat-header .count { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 700; background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 99px; }
  .cat-header .act-btn { opacity: 0; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 14px; transition: opacity 0.2s; padding: 2px 4px; }
  .cat-header:hover .act-btn { opacity: 1; }

  .item-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 4px;
    border-radius: 12px; transition: all 0.2s; animation: popIn 0.25s ease-out both;
  }
  .item-row:hover { transform: translateX(4px); }
  .item-row .act-btn { opacity: 0; background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; font-size: 13px; padding: 2px 4px; transition: opacity 0.2s; }
  .item-row:hover .act-btn { opacity: 1; }

  .check-box {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    color: #0F0F1A; font-weight: 800; transition: all 0.2s;
  }
  .check-box:hover { transform: scale(1.15); }
  .check-box.checked { animation: checkBounce 0.35s ease; }
  .check-box.unchecked { border: 2px solid rgba(255,255,255,0.2); background: transparent; }

  .item-text { flex: 1; font-size: 14.5px; font-weight: 600; transition: all 0.2s; cursor: pointer; }
  .item-text.done { text-decoration: line-through; color: rgba(255,255,255,0.25); }
  .item-text.active { color: rgba(255,255,255,0.85); }

  .add-item-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-item-btn {
    border: none; color: #0F0F1A; width: 38px; height: 38px;
    border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: 700;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
  }

  .add-cat-row { display: flex; gap: 8px; animation: slideUp 0.25s ease; }

  .mobile-toggle {
    display: none; position: fixed; top: 16px; left: 16px; z-index: 100;
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer;
    align-items: center; justify-content: center;
  }
  @media (max-width: 768px) { .mobile-toggle { display: flex; } }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
  .confetti-piece { position: absolute; animation: confettiFall 1.2s ease-out forwards; }
  .done-badge { font-size: 14px; font-weight: 700; animation: wiggle 1s ease infinite; }
  .new-list-form { animation: slideUp 0.25s ease; }

  .data-tools { padding: 8px 16px 12px; display: flex; gap: 4px; }
  .data-tools button {
    background: none; border: none; color: rgba(255,255,255,0.25); font-size: 11px;
    cursor: pointer; font-family: 'Nunito', sans-serif; padding: 4px 8px; border-radius: 6px;
    transition: all 0.2s;
  }
  .data-tools button:hover { color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }

  .edit-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }
  .edit-modal {
    background: #1E1E34; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    padding: 24px; width: 90%; max-width: 400px; animation: popIn 0.25s ease;
  }
  .edit-modal h3 { font-family: 'Fredoka', sans-serif; font-size: 18px; margin-bottom: 14px; }
</style>
</head>
<body>

<button class="mobile-toggle" id="mobileToggle">☰</button>
<div id="confettiLayer" class="confetti-container"></div>
<div id="editOverlay"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Checkmate ✓</div>
      <div class="logo-sub">Your lists, your rules</div>
    </div>
    <div class="sidebar-lists" id="sidebarLists"></div>
    <div class="sidebar-bottom" id="sidebarBottom"></div>
    <div class="data-tools">
      <button onclick="exportData()" title="Export all data as JSON">📤 Export</button>
      <button onclick="importData()" title="Import data from JSON">📥 Import</button>
    </div>
  </div>
  <div class="main" id="mainArea"></div>
</div>

<script>
const PALETTE = [
  { bg:"#FF6B6B", accent:"#FF8E8E" },
  { bg:"#4ECDC4", accent:"#7EDDD6" },
  { bg:"#FFE66D", accent:"#FFF0A0" },
  { bg:"#A78BFA", accent:"#C4B5FD" },
  { bg:"#F472B6", accent:"#F9A8D4" },
  { bg:"#60A5FA", accent:"#93C5FD" },
  { bg:"#34D399", accent:"#6EE7B7" },
  { bg:"#FB923C", accent:"#FDBA74" },
];

const EMOJIS = [
  "🎯","🚀","🌈","⚡","🎨","🔥","✨","🎪","💡","🧹","📌","⭐","🏆","💎","🎁","📋",
  "🏕️","🎣","🏖️","✈️","🗺️","🧳","⛺","🥾","🌄","🏔️","🌊","🚗","🛶","🧭","🌍","🏝️",
  "🍕","🛒","🍳","🧁","☕","🍔","🥗","🍣","🍷","🎂",
  "📚","💼","🖥️","📝","🗂️","📊","🎓","📐","✏️","📎",
  "🏋️","🧘","🏃","💪","🚴","🩺","💊","🧠","❤️","🥦",
  "🏠","🛠️","🪴","🧺","🛋️","🐕","🐈","👶","🎵","🎮",
  "🎄","🎃","🎆","🥂","💝","🐣","🕯️","🎊","🪅","🎒",
];

const CONFETTI_COLORS = ["#FF6B6B","#4ECDC4","#FFE66D","#A78BFA","#F472B6","#60A5FA"];
const LS_KEY = "checkmate_app_data";

let state = { lists: [], activeListId: null, showNewList: false, newListEmoji: "🎯", addingCatToList: null, sidebarOpen: true };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state.lists)); }
function load() { try { const d = localStorage.getItem(LS_KEY); if(d) state.lists = JSON.parse(d); } catch(e){} }

function getProgress(list) {
  const all = list.categories.flatMap(c => c.items);
  if(!all.length) return 0;
  return Math.round(all.filter(i => i.done).length / all.length * 100);
}
function getColors(listId) {
  const idx = state.lists.findIndex(l => l.id === listId);
  return PALETTE[idx % PALETTE.length] || PALETTE[0];
}

function popConfetti() {
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  for(let i = 0; i < 24; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}%;top:-10px;width:${Math.random()*6+3}px;height:${Math.random()*6+3}px;background:${CONFETTI_COLORS[Math.floor(Math.random()*6)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-delay:${i*0.04}s;`;
    layer.appendChild(el);
  }
  setTimeout(() => layer.innerHTML = '', 1400);
}

// ─── EDIT MODAL ──────────────────────

function showEditModal(title, currentValue, onSave) {
  const overlay = document.getElementById('editOverlay');
  overlay.innerHTML = `
    <div class="edit-overlay" onclick="if(event.target===this)closeEditModal();">
      <div class="edit-modal">
        <h3>${esc(title)}</h3>
        <input class="input-field" id="editModalInput" value="${escAttr(currentValue)}" style="margin-bottom:14px;"
          onkeydown="if(event.key==='Enter'){document.getElementById('editModalSave').click();}if(event.key==='Escape')closeEditModal();">
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-ghost" style="padding:8px 16px;" onclick="closeEditModal()">Cancel</button>
          <button class="btn-primary" id="editModalSave" style="background:#4ECDC4;padding:8px 20px;">Save</button>
        </div>
      </div>
    </div>`;
  // Wire up save via closure
  window._editModalCb = onSave;
  document.getElementById('editModalSave').onclick = function() {
    const val = document.getElementById('editModalInput').value.trim();
    if(val && window._editModalCb) { window._editModalCb(val); closeEditModal(); }
  };
  setTimeout(() => { const inp = document.getElementById('editModalInput'); if(inp) { inp.focus(); inp.select(); } }, 60);
}
function closeEditModal() { document.getElementById('editOverlay').innerHTML = ''; window._editModalCb = null; }

function editListName(listId) {
  const list = state.lists.find(l => l.id === listId);
  if(!list) return;
  showEditModal('Rename List', list.name, (val) => { list.name = val; save(); render(); });
}
function editCategoryName(listId, catId) {
  const list = state.lists.find(l => l.id === listId);
  const cat = list?.categories.find(c => c.id === catId);
  if(!cat) return;
  showEditModal('Rename Category', cat.name, (val) => { cat.name = val; save(); render(); });
}
function editItemText(listId, catId, itemId) {
  const list = state.lists.find(l => l.id === listId);
  const cat = list?.categories.find(c => c.id === catId);
  const item = cat?.items.find(i => i.id === itemId);
  if(!item) return;
  showEditModal('Edit Item', item.text, (val) => { item.text = val; save(); render(); });
}

// ─── LIST ACTIONS ─────────────────────

function addList() {
  const inp = document.getElementById('newListInput');
  const name = inp ? inp.value.trim() : '';
  if(!name) return;
  const nl = { id: uid(), name, emoji: state.newListEmoji, categories: [] };
  state.lists.push(nl);
  state.activeListId = nl.id;
  state.showNewList = false;
  state.newListEmoji = "🎯";
  save(); render();
}
function deleteList(id) {
  if(!confirm('Delete this entire list?')) return;
  state.lists = state.lists.filter(l => l.id !== id);
  if(state.activeListId === id) state.activeListId = state.lists.length ? state.lists[0].id : null;
  save(); render();
}
function selectList(id) { state.activeListId = id; render(); }

function addCategory(listId) {
  const inp = document.getElementById('newCatInput');
  const name = inp ? inp.value.trim() : '';
  if(!name) return;
  const list = state.lists.find(l => l.id === listId);
  if(list) { list.categories.push({ id: uid(), name, items: [] }); save(); }
  // Stay open, clear, refocus
  state.addingCatToList = listId;
  render();
  setTimeout(() => { const el = document.getElementById('newCatInput'); if(el) el.focus(); }, 60);
}
function deleteCategory(listId, catId) {
  if(!confirm('Delete this category?')) return;
  const list = state.lists.find(l => l.id === listId);
  if(list) { list.categories = list.categories.filter(c => c.id !== catId); save(); render(); }
}

function addItem(listId, catId) {
  const inp = document.getElementById('itemInput_' + catId);
  const text = inp ? inp.value.trim() : '';
  if(!text) return;
  const list = state.lists.find(l => l.id === listId);
  const cat = list?.categories.find(c => c.id === catId);
  if(cat) { cat.items.push({ id: uid(), text, done: false }); save(); }
  // Clear & refocus for rapid entry
  render();
  setTimeout(() => { const el = document.getElementById('itemInput_' + catId); if(el) el.focus(); }, 60);
}

function toggleItem(listId, catId, itemId) {
  const list = state.lists.find(l => l.id === listId);
  const cat = list?.categories.find(c => c.id === catId);
  const item = cat?.items.find(i => i.id === itemId);
  if(item) {
    item.done = !item.done; save(); render();
    if(item.done) {
      const allDone = list.categories.every(c => c.items.length > 0 && c.items.every(i => i.done));
      if(allDone && list.categories.some(c => c.items.length > 0)) popConfetti();
    }
  }
}
function deleteItem(listId, catId, itemId) {
  const list = state.lists.find(l => l.id === listId);
  const cat = list?.categories.find(c => c.id === catId);
  if(cat) { cat.items = cat.items.filter(i => i.id !== itemId); save(); render(); }
}

// ─── IMPORT / EXPORT ──────────────────

function exportData() {
  const blob = new Blob([JSON.stringify(state.lists, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'checkmate-backup.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importData() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
  inp.onchange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if(Array.isArray(data)) {
          if(confirm(`Import ${data.length} list(s)? This REPLACES your current data.`)) {
            state.lists = data;
            state.activeListId = data.length ? data[0].id : null;
            save(); render();
          }
        } else { alert('Invalid format — expected a JSON array of lists.'); }
      } catch(err) { alert('JSON parse error: ' + err.message); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ─── RENDER ───────────────────────────

function render() { renderSidebar(); renderSidebarBottom(); renderMain(); }

function renderSidebar() {
  const el = document.getElementById('sidebarLists');
  const sb = document.getElementById('sidebar');
  sb.className = state.sidebarOpen ? 'sidebar' : 'sidebar closed';
  document.getElementById('mobileToggle').textContent = state.sidebarOpen ? '✕' : '☰';

  el.innerHTML = state.lists.map((list, i) => {
    const c = PALETTE[i % PALETTE.length]; const prog = getProgress(list);
    const active = state.activeListId === list.id;
    return `<div class="sidebar-item ${active?'active':''}" onclick="selectList('${list.id}')"
      style="${active?`background:${c.bg}18;border-color:${c.bg}40;`:''}">
      <span class="emoji">${list.emoji}</span>
      <div class="info">
        <div class="name" ondblclick="event.stopPropagation();editListName('${list.id}');" title="Double-click to rename">${esc(list.name)}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-track"><div class="progress-bar" style="width:${prog}%;background:${c.bg};"></div></div>
          <span class="pct">${prog}%</span>
        </div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteList('${list.id}')">×</button>
    </div>`;
  }).join('');
}

function renderSidebarBottom() {
  const el = document.getElementById('sidebarBottom');
  if(state.showNewList) {
    el.innerHTML = `<div class="new-list-form">
      <div class="emoji-picker">${EMOJIS.map(e => `<button class="emoji-btn ${state.newListEmoji===e?'selected':''}" onclick="state.newListEmoji='${e}';renderSidebarBottom();">${e}</button>`).join('')}</div>
      <input class="input-field" id="newListInput" placeholder="List name..." style="margin-bottom:8px;" onkeydown="if(event.key==='Enter')addList();if(event.key==='Escape'){state.showNewList=false;render();}">
      <div style="display:flex;gap:8px;">
        <button class="btn-primary" style="flex:1;background:#4ECDC4;" onclick="addList()">Create</button>
        <button class="btn-ghost" style="padding:10px 14px;" onclick="state.showNewList=false;render();">✕</button>
      </div></div>`;
    setTimeout(() => { const inp = document.getElementById('newListInput'); if(inp) inp.focus(); }, 50);
  } else {
    el.innerHTML = `<button class="btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:6px;" onclick="state.showNewList=true;render();"><span style="font-size:18px;">+</span> New List</button>`;
  }
}

function renderMain() {
  const el = document.getElementById('mainArea');
  const list = state.lists.find(l => l.id === state.activeListId);

  if(!list) {
    const has = state.lists.length > 0;
    el.innerHTML = `<div class="empty-state">
      <div class="big-emoji">📋</div>
      <h2>${has?'Pick a list':'No lists yet!'}</h2>
      <p>${has?'Select a list from the sidebar.':'Create your first list and start checking things off.'}</p>
      ${!has?`<button class="btn-primary" style="background:#A78BFA;margin-top:8px;" onclick="state.sidebarOpen=true;state.showNewList=true;render();">+ Create First List</button>`:''}</div>`;
    return;
  }

  const colors = getColors(list.id); const prog = getProgress(list);
  const allDone = prog === 100 && list.categories.some(c => c.items.length > 0);

  let h = `<div class="main-inner">
    <div class="list-header">
      <div class="list-title-row">
        <span class="emoji">${list.emoji}</span>
        <h2 style="color:${colors.bg};" ondblclick="editListName('${list.id}')" title="Double-click to rename">${esc(list.name)}</h2>
      </div>
      <div class="header-progress">
        <div class="track"><div class="bar" style="width:${prog}%;background:linear-gradient(90deg,${colors.bg},${colors.accent});"></div></div>
        <span class="pct" style="color:${colors.bg};">${prog}%</span>
        ${allDone?`<span class="done-badge" style="color:${colors.accent};">🎉 All done!</span>`:''}</div></div>`;

  list.categories.forEach((cat, ci) => {
    const done = cat.items.filter(i=>i.done).length, total = cat.items.length;
    h += `<div class="cat-card" style="animation-delay:${ci*0.08}s;">
      <div class="cat-header">
        <div class="left">
          <div class="dot" style="background:${colors.bg};"></div>
          <h3 ondblclick="editCategoryName('${list.id}','${cat.id}')" title="Double-click to rename">${esc(cat.name)}</h3>
          ${total?`<span class="count">${done}/${total}</span>`:''}
        </div>
        <div style="display:flex;gap:2px;">
          <button class="act-btn" onclick="editCategoryName('${list.id}','${cat.id}')" title="Rename">✏️</button>
          <button class="act-btn" onclick="deleteCategory('${list.id}','${cat.id}')" title="Delete">×</button>
        </div></div>`;

    cat.items.forEach((item, ii) => {
      h += `<div class="item-row" style="animation-delay:${ii*0.04}s;${item.done?'background:rgba(255,255,255,0.02);':''}">
        <div class="check-box ${item.done?'checked':'unchecked'}" style="${item.done?`background:${colors.bg};border:none;`:''}" onclick="toggleItem('${list.id}','${cat.id}','${item.id}')">${item.done?'✓':''}</div>
        <span class="item-text ${item.done?'done':'active'}" ondblclick="editItemText('${list.id}','${cat.id}','${item.id}')" title="Double-click to edit">${esc(item.text)}</span>
        <button class="act-btn" onclick="editItemText('${list.id}','${cat.id}','${item.id}')" title="Edit">✏️</button>
        <button class="act-btn" onclick="deleteItem('${list.id}','${cat.id}','${item.id}')" title="Delete">×</button>
      </div>`;
    });

    h += `<div class="add-item-row">
      <input class="input-field" id="itemInput_${cat.id}" placeholder="Add an item..." style="flex:1;font-size:13px;" onkeydown="if(event.key==='Enter')addItem('${list.id}','${cat.id}');">
      <button class="add-item-btn" style="background:${colors.bg};" onclick="addItem('${list.id}','${cat.id}')">+</button>
    </div></div>`;
  });

  if(state.addingCatToList === list.id) {
    h += `<div class="add-cat-row">
      <input class="input-field" id="newCatInput" placeholder="Category name..." style="flex:1;" onkeydown="if(event.key==='Enter')addCategory('${list.id}');if(event.key==='Escape'){state.addingCatToList=null;render();}">
      <button class="btn-primary" style="background:${colors.bg};" onclick="addCategory('${list.id}')">Add</button>
      <button class="btn-ghost" style="padding:10px 14px;" onclick="state.addingCatToList=null;render();">✕</button></div>`;
  } else {
    h += `<button class="btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;" onclick="state.addingCatToList='${list.id}';render();"><span style="font-size:18px;">+</span> Add Category</button>`;
  }

  h += `</div>`;
  el.innerHTML = h;

  if(state.addingCatToList === list.id) {
    setTimeout(() => { const inp = document.getElementById('newCatInput'); if(inp) inp.focus(); }, 60);
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
document.getElementById('mobileToggle').addEventListener('click', () => { state.sidebarOpen = !state.sidebarOpen; render(); });
load(); render();
</script>
</body>
</html>
